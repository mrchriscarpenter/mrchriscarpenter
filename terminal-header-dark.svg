<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terminal-style GitHub profile header for Chris Carpenter</title>
  <desc id="desc">A dark terminal window introducing Chris Carpenter as a software engineer and civic tech builder.</desc>

  <defs>
    <linearGradient id="terminal-bg" x1="0" y1="0" x2="900" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accent" x1="24" y1="24" x2="876" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>

    <clipPath id="terminal-clip">
      <rect x="24" y="24" width="852" height="292" rx="18"/>
    </clipPath>

    <style>
      .mono {
        font-family:
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          "Courier New",
          monospace;
      }

      .prompt {
        font-size: 20px;
        font-weight: 700;
      }

      .prompt-symbol {
        fill: #34D399;
      }

      .prompt-command {
        fill: #58A6FF;
      }

      .output {
        fill: #C9D1D9;
        font-size: 20px;
        font-weight: 500;
      }

      .accent-text {
        fill: #34D399;
      }

      .muted {
        fill: #8B949E;
        font-size: 17px;
      }

      .cursor {
        animation: blink 1s steps(2, start) infinite;
      }

      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .cursor {
          animation: none;
        }
      }
    </style>
  </defs>

  <!-- Terminal base -->
  <rect x="24" y="24" width="852" height="292" rx="18" fill="url(#terminal-bg)"/>

  <!-- Everything inside the terminal is clipped to the rounded card -->
  <g clip-path="url(#terminal-clip)">
    <!-- Body background -->
    <rect x="24" y="24" width="852" height="292" fill="url(#terminal-bg)"/>

    <!-- Title bar -->
    <rect x="24" y="27" width="852" height="49" fill="#161B22"/>

    <!-- Divider line -->
    <line x1="24" y1="76" x2="876" y2="76" stroke="#30363D"/>

    <!-- Window controls -->
    <circle cx="54" cy="51" r="7" fill="#FF5F56"/>
    <circle cx="78" cy="51" r="7" fill="#FFBD2E"/>
    <circle cx="102" cy="51" r="7" fill="#27C93F"/>

    <!-- Terminal title -->
    <text x="450" y="57" text-anchor="middle" class="mono muted">chris@github: ~/profile</text>

    <!-- Row 1 -->
    <text x="56" y="114" class="mono prompt">
      <tspan class="prompt-symbol">$</tspan><tspan> </tspan><tspan class="prompt-command">whoami</tspan>
    </text>

    <text x="56" y="146" class="mono output">
      <tspan>Chris Carpenter</tspan><tspan class="accent-text"> — </tspan><tspan>software engineer</tspan>
    </text>

    <!-- Row 2 -->
    <text x="56" y="190" class="mono prompt">
      <tspan class="prompt-symbol">$</tspan><tspan> </tspan><tspan class="prompt-command">focus</tspan>
    </text>

    <text x="56" y="222" class="mono output">
      <tspan>civic tech</tspan><tspan class="accent-text"> · </tspan>
      <tspan>internal tools</tspan><tspan class="accent-text"> · </tspan>
      <tspan>developer experience</tspan>
    </text>

    <!-- Row 3 -->
    <text x="56" y="266" class="mono prompt">
      <tspan class="prompt-symbol">$</tspan><tspan> </tspan><tspan class="prompt-command">stack</tspan>
    </text>

    <text x="56" y="298" class="mono output">
      <tspan>Go</tspan><tspan class="accent-text"> · </tspan>
      <tspan>TypeScript</tspan><tspan class="accent-text"> · </tspan>
      <tspan>Svelte</tspan><tspan class="accent-text"> · </tspan>
      <tspan>Next.js</tspan><tspan class="accent-text"> · </tspan>
      <tspan>React</tspan><tspan class="accent-text"> · </tspan>
      <tspan>PostgreSQL</tspan>
    </text>

    <!-- Cursor -->
    <rect
      class="cursor"
      x="716"
      y="278"
      width="14"
      height="24"
      rx="2.5"
      fill="#34D399"
    />
  </g>

  <!-- Outer border, drawn before the accent so it does not cover the top gradient -->
  <rect x="24.5" y="24.5" width="851" height="291" rx="17.5" stroke="#30363D"/>

  <!-- Top accent line, drawn last so it becomes the clean top edge -->
  <g clip-path="url(#terminal-clip)">
    <rect x="24" y="24" width="852" height="3" fill="url(#accent)"/>
  </g>
</svg>